<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="intro">
        <div class="item">
            <h2>Player 1</h2>
            <img src="./cross.png" alt="cross">
        </div>
        <div class="item">
            <h2>Player 2</h2>
            <img src="./zero.png" alt="zero">
        </div>
    </div>

    <h2 id = "display"></h2>


    <div id="board">
        <div class="row0">
            <button class="col0"></button>
            <button class="col1"></button>
            <button class="col2"></button>
        </div>
        <div class="row1">
            <button class="col0"></button>
            <button class="col1"></button>
            <button class="col2"></button>
        </div>
        <div class="row2">
            <button class="col0"></button>
            <button class="col1"></button>
            <button class="col2"></button>
        </div>
    </div>

    <button id="resetBtn">Reset Game</button>
</body>
<script src="./script.js"></script>

</html>
