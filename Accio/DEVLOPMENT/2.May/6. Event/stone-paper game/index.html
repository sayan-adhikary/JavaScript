<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone Paper Scissor Game</title>
</head>

<body>

    <h1>Stone Paper Scissor Game</h1>

    <h2 id="result">Choose one option</h2>

    <p id="user-choice">My choice: </p>
    <p id="computer-choice">Computer choice: </p>

    <!-- Stone Button -->
    <button id="stone">
        <img src="rock.png" alt="Stone" width="100">
    </button>

    <!-- Paper Button -->
    <button id="paper">
        <img src="paper.png" alt="Paper" width="100">
    </button>

    <!-- Scissor Button -->
    <button id="scissor">
        <img src="scissors.png" alt="Scissor" width="100">
    </button>

</body>
<script src="./script.js"></script>

</html>
