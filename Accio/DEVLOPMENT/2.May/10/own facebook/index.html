<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faceboobk By Sayan</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div id="left-part">
            <div class="image">
                <img src="./pic.jpg" alt="profile">
            </div>
            <div class="react">
                <button class="btn">like</button><span>0</span>
                <button class="btn">dislike</button><span>0</span>
                <button class="btn">share</button><span>0</span>
            </div>
            <div class="comment">
                <input id="comment" type="text" placeholder="Write a comment">
                <button id="add-comm">add comment</button>
            </div>
        </div>
        <div id="right-part">
            <h1>Comments</h1>
            <div class="newComm">
                <!-- comment -->
            </div>
            <button id="delete-all">delete all</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
