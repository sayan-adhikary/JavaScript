<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="container">
        <div class="item" id="image-div">
            <div id="photo">
                <img src="./img.jpg" alt="cat">
            </div>
            <div id="props">
                <div class="data">
                    <button id="like">Like</button>
                    <span>0</span>
                </div>
                <div class="data">
                    <button id="dislike">Dislike</button>
                    <span>0</span>
                </div>
                <div class="data">
                    <button id="share">Share</button>
                    <span>0</span>
                </div>
            </div>
            <div id="comment-msg">
                <input type="text" placeholder="Beautiful Image...">
                <button id="add-comment">comment</button>
            </div>
        </div>
        <div class="item" id="comments">
            <h2>Comments</h2>
            <button>Delete All Comments</button>
        </div>

    </div>
</body>
<script src="./script.js"></script>
</html>
