<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <form>
        <div class="container">
            <label>Name</label>
            <input type="text" id="name">
        </div>
        <div class="container">
            <label>height</label>
            <input type="text" id="height">
        </div>
        <div class="container">
            <label>weight</label>
            <input type="text" id="weight">
        </div>
        <div class="container">
            <label>age</label>
            <input type="text" id="age">
        </div>
        <button>submit</button>
    </form>

    <table border="2">
        <thead>
            <tr>
                <th><button class="btn" id="sort-Bmi">Name</button></th>
                <th><button class="btn" id="sort-Height">height</button></th>
                <th><button class="btn" id="sort-Weight">Weight</button></th>
                <th><button class="btn" id="sort-Age">Age</button></th>
                <th><button class="btn" id="sort-BMI">BMI</button></th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script src="./script.js"></script>
</body>

</html>
