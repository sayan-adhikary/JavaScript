<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post with Comments</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main id="app">
        <section class="container" id="postContainer">

            <!-- Left Side -->
            <div class="left-panel" id="leftPanel">
                <div class="post-card" id="postCard">
                    <img id="postImage" class="post-image" src="./choker.png" alt="Post Image" />
                </div>

                <div class="post-actions" id="postActions">
                    <div class="action-group like-group" id="likeGroup">
                        <button type="button" id="likeBtn" class="action-btn like-btn">Like</button>
                        <span id="likeCount" class="count">0</span>
                    </div>

                    <div class="action-group share-group" id="shareGroup">
                        <button type="button" id="shareBtn" class="action-btn share-btn">Share</button>
                        <span id="shareCount" class="count">0</span>
                    </div>
                </div>

                <div class="comment-input-area" id="commentInputArea">
                    <input type="text" id="commentInput" class="comment-input" placeholder="Comment here..." />
                    <button type="button" id="addCommentBtn" class="add-btn">Add</button>
                </div>
            </div>

            <!-- Right Side -->
            <div class="right-panel" id="rightPanel">
                <div id="commentsSection" class="comments-section">
                    <h2 id="commentsTitle" class="section-title">Comments</h2>

                    <div id="commentsList" class="comments-list" tabindex="0">
                        <!-- Single comment structure -->
                        <!--
            <div class="comment-item" data-comment-id="1">
              <p class="comment-text">This is a comment.</p>
              <div class="comment-buttons">
                <button type="button" class="comment-like-btn">Like</button>
                <button type="button" class="comment-delete-btn">Delete</button>
              </div>
            </div>
            -->
                    </div>
                    
                    <button type="button" id="deleteAllBtn" class="delete-all-btn">
                        Delete All
                    </button>
                </div>
            </div>

        </section>
    </main>
    <script src="./script.js"></script>
</body>

</html>
