<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Margin Assignment</title>

    <!-- Link your external CSS file here -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CSS Margin Assignment</h1>

    <!-- Task 1: Single Value -->
    <!-- Target #box1
       Step 1: bg color - blue
       Step 2: margin - 20px -->
    <div id="box1">Margin: 20px (all sides)</div>

    <!-- Task 2: Two Values -->
    <!-- Target #box2
       Step 1: bg color: red
       Step 2: margin: 20px 40px
       (top-bottom: 20px, left-right: 40px) -->
    <div id="box2">Margin: 20px(top-bottom), 40px(left-right)</div>

    <!-- Task 3: Three Values -->
    <!-- Target #box3
       Step 1: bg color: blue
       Step 2: margin: 10px 30px 50px
       (top: 10px, left-right: 30px, bottom: 50px) -->
    <div id="box3">top: 10px, left-right: 30px, bottom: 50px</div>

    <!-- Task 4: Four Values -->
    <!-- Target #box4
       Step 1: bg color: red
       Step 2: margin: 10px 20px 30px 40px
       (top, right, bottom, left) -->
    <div id="box4">Margin: 10px 20px 30px 40px (top, right, bottom, left)</div>

    <!-- Task 5: Individual Sides -->
    <!-- Target #box5
       Step 1: bg color: blue
       Step 2:
         margin-top: 30px
         margin-right: 20px
         margin-bottom: 10px
         margin-left: 40px -->
    <div id="box5">Individual Margins</div>
  </body>
</html>
