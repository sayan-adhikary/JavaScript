<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Padding Assignment</title>

    <!-- Link your external CSS file here -->
     <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>CSS Padding Assignment</h1>

    <!-- Task 1: Single Value -->
    <!-- Target #box1
       Step 1: background-color: blue
       Step 2: padding: 20px -->
    <div id="box1">Padding: 20px (all sides)</div>

    <!-- Task 2: Two Values -->
    <!-- Target #box2
       Step 1: background-color: red
       Step 2: padding: 10px 30px
       (top-bottom: 10px, left-right: 30px) -->
    <div id="box2">Padding: 10px 30px</div>

    <!-- Task 3: Three Values -->
    <!-- Target #box3
       Step 1: background-color: blue
       Step 2: padding: 5px 20px 40px
       (top: 5px, left-right: 20px, bottom: 40px) -->
    <div id="box3">Padding: 5px 20px 40px</div>

    <!-- Task 4: Four Values -->
    <!-- Target #box4
       Step 1: background-color: red
       Step 2: padding: 10px 20px 30px 40px -->
    <div id="box4">Padding: 10px 20px 30px 40px</div>

    <!-- Task 5: Individual Sides -->
    <!-- Target #box5
       Step 1: background-color: blue
       Step 2:
         padding-top: 30px
         padding-right: 20px
         padding-bottom: 10px
         padding-left: 40px -->
    <div id="box5">Individual Padding</div>

    <!-- Task 6: Padding + Width -->
    <!-- Target #box6
       Step 1: background-color: red
       Step 2:
         width: 200px
         padding: 20px
       Observe: box becomes bigger -->
    <div id="box6">Width + Padding</div>

    <!-- Task 7: Fix using box-sizing -->
    <!-- Target #box7
       Step 1: background-color: blue
       Step 2:
         width: 200px
         padding: 20px
         box-sizing: border-box
       Observe: width remains 200px -->
    <div id="box7">Box-sizing Fix</div>

    <!-- Task 8: Nested Elements -->
    <!-- Target #parent and #child
       Step 1: Give padding to parent
       Step 2: Give different padding to child
       Observe spacing inside spacing -->
    <div id="parent">
      Parent
      <div id="child">Child</div>
    </div>
  </body>
</html>
