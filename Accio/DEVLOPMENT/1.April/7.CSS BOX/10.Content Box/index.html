  <body>
    <h1>Content-Box Practice</h1>

    <!-- Problem 1: Basic Box -->
    <!-- Target #box1
       width: 200px
       padding: 20px
       border: 5px solid black
       background-color: lightblue

       Question:
       What is the TOTAL width of the box?
       (Hint: content + padding + border) -->
    <div id="box1">Box 1</div>

    <!-- Problem 2: Increase Padding -->
    <!-- Target #box2
       width: 200px
       padding: 40px
       border: 5px solid red
       background-color: lightcoral

       Question:
       Did total size increase? Why? -->
    <div id="box2">Box 2</div>

    <!-- Problem 3: Multiple Boxes -->
    <!-- Target #box3 and #box4

       For both:
       width: 200px
       padding: 20px
       border: 5px solid blue
       display: inline-block

       Question:
       Do they fit in one row?
       Why or why not? -->
    <div id="box3">Box 3</div>
    <div id="box4">Box 4</div>

    <!-- Problem 4: Container Overflow -->
    <!-- Target #container and .card

       container width: 500px
       background-color: lightgray

       card:
       width: 150px
       padding: 20px
       border: 5px solid black
       display: inline-block

       Question:
       Do all cards fit inside container?
       If not, why? -->
    <div id="container">
      <div class="card">Card 1</div>
      <div class="card">Card 2</div>
      <div class="card">Card 3</div>
    </div>
