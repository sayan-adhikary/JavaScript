<html lang="en">

<head>
  <meta charset="UTF-8" />

<body>
  <form>
    <label for="name">Name</label>

  <h3>form 2</h3>
  <form>
    <label for="use">Username</label>
    <input type="text" name id />
    <input type="checkbox" />
    <label for="js">js</label>
    <input type="checkbox" />
    <label for="js">java</label>
    <input type="checkbox" />
    <label for="js">python</label>
    <input type="radio" />
    <label for="js">python</label>
  </form>
  <h3>form 3</h3>
  <h2>Ragistration Form</h2>
  <form>
    <div>
      <label for="Fname">First Name</label>
      <input id="Fname" name="Fname" type="text" />
      <div>
        <label for="Lname">Last Name</label>
        <input id="Lname" name="Lname" type="text" />
      </div>
      <div>
        <label for="NName">Nick Name</label>
        <input id="NName" name="NName" type="text" />
      </div>
    </div>
  </form>

  <h3>Formatted Part</h3>
  <div class="formatted-part">
    <p>
      Use this section for a clean, formatted form layout with consistent
      spacing and labels.
    </p>
    <form>
      <label for="formatted-name">Name</label>
      <input id="formatted-name" name="formatted-name" type="text" placeholder="Enter your full name" />

      <label for="formatted-email">Email</label>
      <input id="formatted-email" name="formatted-email" type="email" placeholder="Enter your email address" />

      <label for="formatted-password">Password</label>
      <input id="formatted-password" name="formatted-password" type="password" placeholder="Create a password" />

      <button type="submit">Submit</button>
    </form>
  </div>
</body>

</html>
