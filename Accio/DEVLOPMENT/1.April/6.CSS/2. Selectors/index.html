<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Selectors Assignment</title>

    <!-- Link your external CSS file here -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>CSS Selectors Assignment</h1>

    <!-- Task 1: Element Selector -->
    <!-- Target all <p> elements -->
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>

    <!-- Task 2: ID Selector -->
    <!-- Target the element with id="main-heading" -->
    <h2 id="main-heading">Main Heading</h2>

    <!-- Task 3: Class Selector -->
    <!-- Target all elements with class="highlight" -->
    <p class="highlight">Highlighted text 1</p>
    <p class="highlight">Highlighted text 2</p>

    <!-- Task 4: Group Selector -->
    <!-- Target all <h3> and <span> elements together -->
    <h3>Subheading</h3>
    <span>This is a span</span>

    <!-- Task 5: Child Selector -->
    <!-- Target only direct <li> children of <ul> -->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <div>
            <li>Item 3 (nested)</li>
        </div>
    </ul>

    <!-- Task 6: Descendant / Nested Selector -->
    <!-- Target all <p> inside .container -->
    <div class="container">
        <p>Inside container</p>
        <div>
            <p>Deep nested paragraph</p>
        </div>
    </div>

    <p>Outside container</p>

</body>

</html>
