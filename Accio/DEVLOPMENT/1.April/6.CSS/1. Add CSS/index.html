<!DOCTYPE html>
<html>
<head>
  <title>CSS Assignment</title>

  <!-- 
    TASK 2:
    Use INTERNAL CSS here.
    Inside <style> tag, select #div2 and change its background color.
    
    Example:
    #div2 {
      background-color: green;
    }
  -->
    <style>
        #div2{
            background-color: aqua;
        }
    </style>

  <!-- 
    TASK 3:
    Link an EXTERNAL CSS file named "styles.css"
    and write CSS for #div3 inside that file.
  -->
    <link rel="stylesheet" href="style.css  ">

</head>

<body>

  <!-- 
    TASK 1:
    Use INLINE CSS to change background color of this div.
  -->
  <div id="div1" style="background-color: rgb(239, 139, 9);">
    This is Div 1 (Inline CSS)
  </div>

  <!-- 
    TASK 2:
    Apply INTERNAL CSS to this div using <style> in head
  -->
  <div id="div2">
    This is Div 2 (Internal CSS)
  </div>

  <!-- 
    TASK 3:
    Apply EXTERNAL CSS to this div using styles.css
  -->
  <div id="div3">
    This is Div 3 (External CSS)
  </div>

</body>
</html>
