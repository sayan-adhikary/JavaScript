<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CSS Font Assignment</title>

    <!-- 
    TASK 6:
    Go to https://fonts.google.com
    Search for "Press Start 2P"
    Copy the <link> tag and paste it here
-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides&family=Press+Start+2P&display=swap" rel="stylesheet" />

    <!-- Link your external CSS file here -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>CSS Font Assignment</h1>

    <!-- Task 1: Font Size -->
    <!-- Target #text1
       font-size: 24px -->
    <p id="text1">This is font-size example</p>

    <!-- Task 2: Font Weight -->
    <!-- Target #text2
       font-weight: bold -->
    <p id="text2">This is font-weight example</p>

    <!-- Task 3: Font Family -->
    <!-- Target #text3
       font-family: Arial, sans-serif -->
    <p id="text3">This is font-family example</p>

    <!-- Task 4: Line Height -->
    <!-- Target #text4
       line-height: 1.8 -->
    <p id="text4">
        This is line-height example. This text should have more space between
        lines. Observe the difference clearly.
    </p>

    <!-- Task 5: Font Style -->
    <!-- Target #text5
       font-style: italic -->
    <p id="text5">This is font-style example</p>

    <!-- Task 6: Google Font -->
    <!-- After adding the Google Font link in <head>,
       Target #text6
       font-family: 'Press Start 2P', cursive -->
    <p id="text6">This is Google Font (Retro Style)</p>
</body>

</html>
